openapi: 3.0.3
info:
  title: Invite API
  version: 1.0.0
servers:
  - url: /api
paths:
  /persons:
    get:
      summary: List all persons
      operationId: ListPersons
      responses:
        '200':
          description: A list of persons
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Person'
    post:
      summary: Create a new person
      operationId: CreatePerson
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewPerson'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Person'
  /persons/{id}:
    get:
      summary: Get a person by ID
      operationId: GetPerson
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: A person
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Person'
        '404':
          description: Not found
    patch:
      summary: Update a person
      operationId: UpdatePerson
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePerson'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Person'
        '404':
          description: Not found
    delete:
      summary: Delete a person
      operationId: DeletePerson
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Deleted
        '404':
          description: Not found

  /invites:
    get:
      summary: List all invites
      operationId: ListInvites
      responses:
        '200':
          description: A list of invites
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Invite'
    post:
      summary: Create a new invite
      operationId: CreateInvite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewInvite'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invite'
  /invites/{id}:
    get:
      summary: Get an invite by ID
      operationId: GetInvite
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: An invite
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invite'
        '404':
          description: Not found
    patch:
      summary: Update an invite
      operationId: UpdateInvite
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateInvite'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invite'
        '404':
          description: Not found
    delete:
      summary: Delete an invite
      operationId: DeleteInvite
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Deleted
        '404':
          description: Not found

  /invites/{id}/phases:
    get:
      summary: List phases for an invite
      operationId: ListInvitePhases
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: A list of phases
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InvitePhase'
    post:
      summary: Add a phase to an invite
      operationId: CreateInvitePhase
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewInvitePhase'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvitePhase'
  /invites/{id}/phases/{phase_id}:
    delete:
      summary: Delete a phase from an invite
      operationId: DeleteInvitePhase
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: phase_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Deleted
        '404':
          description: Not found

  /invites/{id}/start:
    post:
      summary: Start the invite process
      operationId: StartInvite
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Invite started successfully
        '400':
          description: Invite cannot be started (e.g., already started or no phases)
        '404':
          description: Invite not found

  /invites/{id}/status:
    get:
      summary: Get current progress and pending invitees
      operationId: GetInviteStatus
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Invite status report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteStatusReport'
        '404':
          description: Invite not found

  /respond/{token}:
    get:
      summary: Get invite details for response
      operationId: GetInviteForResponse
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Invite details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicInviteDetails'
        '404':
          description: Token not found
    post:
      summary: Accept or decline an invite
      operationId: RespondToInvite
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteResponse'
      responses:
        '204':
          description: Response recorded
        '404':
          description: Token not found

  /groups:
    get:
      summary: List all groups
      operationId: ListGroups
      responses:
        '200':
          description: A list of groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Group'
    post:
      summary: Create a new group
      operationId: CreateGroup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewGroup'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
  /groups/{id}:
    get:
      summary: Get a group by ID
      operationId: GetGroup
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: A group
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
        '404':
          description: Not found
    patch:
      summary: Update a group
      operationId: UpdateGroup
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateGroup'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
        '404':
          description: Not found
    delete:
      summary: Delete a group
      operationId: DeleteGroup
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Deleted
        '404':
          description: Not found
  /groups/{id}/members:
    get:
      summary: List members of a group
      operationId: ListGroupMembers
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: A list of persons in the group
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Person'
    post:
      summary: Add a member to a group
      operationId: AddGroupMember
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddGroupMemberRequest'
      responses:
        '204':
          description: Added
        '404':
          description: Group or Person not found
  /groups/{id}/members/{person_id}:
    delete:
      summary: Remove a member from a group
      operationId: RemoveGroupMember
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: person_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Removed
        '404':
          description: Membership not found

components:
  schemas:
    Person:
      type: object
      required: [id, email, name]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
    NewPerson:
      type: object
      required: [email, name]
      properties:
        email:
          type: string
          format: email
        name:
          type: string
    UpdatePerson:
      type: object
      properties:
        email:
          type: string
          format: email
        name:
          type: string
    
    Invite:
      type: object
      required: [id, title, from, created_at, status]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        from:
          type: string
          format: date-time
        to:
          type: string
          format: date-time
        duration_ns:
          type: integer
          description: Duration in nanoseconds
        created_at:
          type: string
          format: date-time
        status:
          type: string
          enum: [pending, active, completed, cancelled]

    NewInvite:
      type: object
      required: [title, from]
      properties:
        title:
          type: string
        description:
          type: string
        from:
          type: string
          format: date-time
        to:
          type: string
          format: date-time
        duration_ns:
          type: integer

    UpdateInvite:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        from:
          type: string
          format: date-time
        to:
          type: string
          format: date-time
        duration_ns:
          type: integer
        status:
          type: string
          enum: [pending, active, completed, cancelled]

    InvitePhase:
      type: object
      required: [id, invite_id, order, strategy_kind, strategy_config]
      properties:
        id:
          type: string
          format: uuid
        invite_id:
          type: string
          format: uuid
        order:
          type: integer
        strategy_kind:
          type: string
          enum: [ladder, sprint]
        strategy_config:
          type: object
          description: JSON configuration specific to the strategy

    NewInvitePhase:
      type: object
      required: [order, strategy_kind, strategy_config]
      properties:
        order:
          type: integer
        strategy_kind:
          type: string
          enum: [ladder, sprint]
        strategy_config:
          type: object

    InviteStatusReport:
      type: object
      required: [invite_id, overall_status]
      properties:
        invite_id:
          type: string
          format: uuid
        overall_status:
          type: string
        active_phase:
          type: object
          properties:
            id:
              type: string
              format: uuid
            order:
              type: integer
            strategy_kind:
              type: string
            progress_message:
              type: string
              description: Human-readable progress from the strategy
            next_check_at:
              type: string
              format: date-time
        pending_invitees:
          type: array
          items:
            $ref: '#/components/schemas/PendingInvitee'

    PendingInvitee:
      type: object
      required: [id, email, name, invited_at, magic_token]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        invited_at:
          type: string
          format: date-time
        magic_token:
          type: string
          format: uuid

    PublicInviteDetails:
      type: object
      required: [invite_id, title, from, current_state]
      properties:
        invite_id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        from:
          type: string
          format: date-time
        to:
          type: string
          format: date-time
        current_state:
          type: string
          enum: [pending, accepted, declined, expired]

    InviteResponse:
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum: [accept, decline]

    Group:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string

    NewGroup:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string

    UpdateGroup:
      type: object
      properties:
        name:
          type: string
        description:
          type: string

    AddGroupMemberRequest:
      type: object
      required: [person_id]
      properties:
        person_id:
          type: string
          format: uuid
